<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PUIE - Perceptual UI Engine</title>
<link rel="manifest" href="manifest.json">
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  background: #111;
  color: #fff;
  transition: all 0.3s ease;
  padding: 20px;
}
h1 { font-size: 1.5rem; margin-bottom: 10px; }
button {
  padding: 14px 28px;
  margin: 10px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #333;
  color: #fff;
}
#status {
  margin-top: 20px;
  font-size: 1.2rem;
  padding: 10px;
  border-radius: 8px;
  background: rgba(255,255,255,0.1);
}
#cta { transition: transform 0.2s ease; }
#cta.highlight {
  border: 2px solid yellow;
  transform: scale(1.2);
  background: #555;
}
body.engaged { background: #1a1a2e; }
body.confused { background: #2e1a1a; }
body.overstimulated { background: #2e002e; }
body.inactive { background: #111; opacity: 0.7; }
.state-badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.8rem;
  margin-top: 8px;
}
.badge-engaged { background: #1a8a1a; }
.badge-confused { background: #8a1a1a; }
.badge-overstimulated { background: #6a006a; }
.badge-inactive { background: #444; }
</style>
</head>
<body>
<h1>Perceptual UI Engine</h1>
<p>Sistema Nervioso Digital - PNSF Demo</p>
<button id="start">Iniciar Sistema</button>
<button id="cta">Interactuar</button>
<div id="status">Estado: idle</div>
<script>
/* EVENT BUS */
class EventBus {
  constructor(){ this.listeners = {}; }
  on(e, cb){ (this.listeners[e] ||= []).push(cb); }
  emit(e, data){ (this.listeners[e]||[]).forEach(cb=>cb(data)); }
}
/* AUDIO SENSOR */
class AudioSensor {
  constructor(bus){ this.bus = bus; this.level = 0; }
  async init(){
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    this.ctx = new AudioContext();
    const source = this.ctx.createMediaStreamSource(stream);
    this.analyser = this.ctx.createAnalyser();
    source.connect(this.analyser);
    this.data = new Uint8Array(this.analyser.fftSize);
    this.loop();
  }
  loop(){
    this.analyser.getByteTimeDomainData(this.data);
    let sum=0;
    for(let i=0;i<this.data.length;i++){
      let v=(this.data[i]-128)/128;
      sum+=v*v;
    }
    this.level = Math.sqrt(sum/this.data.length);
    this.bus.emit('audio',{level:this.level});
    requestAnimationFrame(()=>this.loop());
  }
}
/* MOTION SENSOR */
class MotionSensor {
  constructor(bus){ this.bus = bus; this.level = 0; }
  async init(){
    if(DeviceMotionEvent.requestPermission){
      await DeviceMotionEvent.requestPermission();
    }
    window.addEventListener('devicemotion',(e)=>{
      let a=e.accelerationIncludingGravity;
      if(!a)return;
      this.level=Math.sqrt(a.x*a.x+a.y*a.y+a.z*a.z);
      this.bus.emit('motion',{level:this.level});
    });
  }
}
/* INTERACTION SENSOR */
class InteractionSensor {
  constructor(bus){ this.bus = bus; this.lastInteraction = Date.now(); }
  init(){
    document.body.addEventListener('click',()=>{
      this.lastInteraction = Date.now();
      this.bus.emit('interaction',{});
    });
    setInterval(()=>{
      let idle = Date.now()-this.lastInteraction;
      this.bus.emit('interaction_idle',{idle});
    },500);
  }
}
/* INFERENCE ENGINE */
class InferenceEngine {
  constructor(bus){
    this.bus = bus;
    this.audio = 0; this.motion = 0; this.idle = 0;
    bus.on('audio', d=> this.audio = d.level);
    bus.on('motion', d=> this.motion = d.level);
    bus.on('interaction_idle', d=> this.idle = d.idle);
    setInterval(()=>this.evaluate(),300);
  }
  evaluate(){
    let state = 'engaged';
    if(this.audio > 0.4 && this.motion > 15){ state = 'overstimulated'; }
    else if(this.idle > 5000){ state = 'inactive'; }
    else if(this.audio < 0.1 && this.motion < 5){ state = 'confused'; }
    this.bus.emit('state',{state});
  }
}
/* RESPONSE ENGINE */
class ResponseEngine {
  constructor(bus){
    this.bus = bus;
    this.ctx = new AudioContext();
    bus.on('state', d=> this.apply(d.state));
  }
  apply(state){
    document.body.className = state;
    document.getElementById('status').innerHTML =
      'Estado: <strong>'+state+'</strong>' +
      '<br><span class="state-badge badge-'+state+'">'+state.toUpperCase()+'</span>';
    let cta = document.getElementById('cta');
    if(state==='confused'){
      cta.classList.add('highlight');
      this.beep(200);
    } else {
      cta.classList.remove('highlight');
    }
    if(state==='overstimulated'){ this.beep(500); }
  }
  beep(freq){
    let osc = this.ctx.createOscillator();
    let gain = this.ctx.createGain();
    osc.frequency.value = freq;
    gain.gain.value = 0.1;
    osc.connect(gain);
    gain.connect(this.ctx.destination);
    osc.start();
    osc.stop(this.ctx.currentTime+0.1);
  }
}
/* PUIE ENGINE */
class PUIE {
  constructor(){
    this.bus = new EventBus();
    this.audio = new AudioSensor(this.bus);
    this.motion = new MotionSensor(this.bus);
    this.interaction = new InteractionSensor(this.bus);
    this.inference = new InferenceEngine(this.bus);
    this.response = new ResponseEngine(this.bus);
  }
  async init(){
    await this.audio.init();
    await this.motion.init();
    this.interaction.init();
    document.getElementById('status').innerText = 'Sistema activo - interactúa para comenzar';
  }
}
const app = new PUIE();
document.getElementById('start').onclick = ()=>{ app.init(); };
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('service-worker.js');
}
</script>
</body>
</html>
